<section class="achievement-generator">
  <h2>New achievement</h2>
  <p class="hint">
    Describe something you did — the System will judge you.
  </p>

  <div class="controls">
    <mat-form-field appearance="outline" class="field">
      <mat-label>What happened?</mat-label>
      <input
        matInput
        type="text"
        [formControl]="trigger"
        placeholder="e.g. I just ate a cold burrito"
        autocomplete="off"
        (keydown.enter)="generate()"
      />
    </mat-form-field>
    <button
      mat-raised-button
      type="button"
      color="accent"
      class="generate-btn"
      (click)="generate()"
      [disabled]="loading() || trigger.invalid"
    >
      @if (loading()) {
        Generating…
      } @else {
        Generate
      }
    </button>
  </div>

  @if (errorMessage(); as err) {
    <p class="error" role="alert">{{ err }}</p>
  }

  @for (row of displayRows(); track row.id) {
    <div class="achievement-reveal" aria-live="polite" role="dialog" aria-modal="true">
      <div class="glitch-flash"></div>
      <div class="achievement-panel">
        <p class="achievement-label">SYSTEM NOTIFICATION</p>
        <p class="achievement-text">{{ row.text }}</p>
        <div class="actions">
          <button mat-raised-button color="warn" (click)="dismiss()">Dismiss</button>
        </div>
      </div>
    </div>
  }
</section>
