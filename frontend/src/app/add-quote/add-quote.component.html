<section class="add-quote">
  <h2>Add a quote</h2>

  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <label class="field">
      <span>Character</span>
      <input type="text" formControlName="character" autocomplete="off" />
    </label>

    <label class="field">
      <span>Quote</span>
      <textarea formControlName="text" rows="4"></textarea>
    </label>

    <div class="row">
      <label class="field">
        <span>Book #</span>
        <input type="number" formControlName="bookNumber" min="1" />
      </label>
      <label class="field">
        <span>Chapter #</span>
        <input type="number" formControlName="chapterNumber" min="1" />
      </label>
    </div>

    @if (submitError) {
      <p class="error" role="alert">Could not save quote. Try again.</p>
    }

    <button type="submit" [disabled]="form.invalid">Add quote</button>
  </form>
</section>
